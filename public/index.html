<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Iris Petals</title>
<meta name="description" content="Iris Petals Offers" />
<link id="faviconTag" rel="icon" href="" />
<style>
@import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Tajawal:wght@400;500;700;800&display=swap");

:root {
  --bg: #f8f7fa;
  --surface: #ffffff;
  --line: #e9e2ef;
  --brand: #7a3d89;
  --brand-soft: #e9dcf4;
  --ink: #222028;
  --muted: #6e6677;
  --ok: #1f8557;
  --err: #b8324b;
  --warn-bg: #fff7dc;
  --warn-line: #f1e1a6;
  --warn-ink: #7d6821;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: "Tajawal", "Manrope", "Segoe UI", Tahoma, sans-serif;
  font-size: 15px;
  line-height: 1.55;
  background:
    radial-gradient(1100px 340px at 88% -16%, #efe6f7 0, transparent 62%),
    radial-gradient(850px 260px at -8% 0, #f8f2dc 0, transparent 60%),
    var(--bg);
  color: var(--ink);
}

.wrap {
  max-width: 1220px;
  margin: 0 auto;
  padding: 16px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 20px;
  box-shadow: 0 14px 30px rgba(122, 61, 137, 0.08);
}

.hero {
  padding: 20px;
  position: relative;
  overflow: hidden;
  margin-bottom: 14px;
  direction: rtl;
}

.hero::before,
.hero::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}

.hero::before {
  inline-size: 190px;
  block-size: 190px;
  inset-inline-end: -70px;
  inset-block-start: -80px;
  background: #f0e8f7;
}

.hero::after {
  inline-size: 130px;
  block-size: 130px;
  inset-inline-start: -50px;
  inset-block-end: -40px;
  background: #f8f2dc;
}

.topbar {
  display: flex;
  justify-content: center;
  align-items: center;
  min-block-size: 108px;
  position: relative;
  z-index: 1;
}

.brand {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-inline: auto;
}

.logo {
  inline-size: 96px;
  block-size: 96px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid #d6c7e5;
  background: #f2edf7;
}

.logo-fallback {
  inline-size: 96px;
  block-size: 96px;
  border-radius: 50%;
  border: 1px solid #d6c7e5;
  background: linear-gradient(140deg, #efe7f7, #e2d3ef);
  display: grid;
  place-items: center;
  color: var(--brand);
  font-size: 44px;
}

.brand-name {
  margin: 0;
  font-size: clamp(30px, 4vw, 52px);
  line-height: 1;
  font-weight: 700;
}

.lang-switch {
  position: absolute;
  top: 0;
  left: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}

.lang-btn {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 999px;
  padding: 8px 14px;
  cursor: pointer;
  font-weight: 700;
}

.lang-btn.active {
  background: #f1e8f8;
  color: #5d2f71;
  border-color: #d7bce8;
}

.hero-main {
  margin-top: 6px;
  position: relative;
  z-index: 1;
  text-align: center;
}

.hero-main p {
  margin: 0;
  font-size: clamp(15px, 1.8vw, 18px);
  font-weight: 800;
  line-height: 1.5;
}

.promo-line {
  margin-top: 8px;
  position: relative;
  z-index: 1;
  text-align: center;
}

.promo-line span {
  display: inline-block;
  font-size: clamp(15px, 1.8vw, 18px);
  font-weight: 800;
  line-height: 1.5;
  font-family: "Manrope", "Tajawal", "Segoe UI", Tahoma, sans-serif;
  color: #5d2f71;
  background: #f4eafc;
  border: 1px dashed #d5bbe7;
  border-radius: 999px;
  padding: 4px 12px;
}

.fast-row {
  margin-top: 8px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  position: relative;
  z-index: 1;
}

.fast-row img {
  inline-size: 28px;
  block-size: 28px;
  border-radius: 8px;
  object-fit: cover;
  border: 1px solid var(--line);
}

.fast-text {
  font-size: 15px;
  font-weight: 800;
  line-height: 1.5;
}

.head {
  margin: 18px 0 8px;
}

.head h2 {
  margin: 0;
  font-size: clamp(21px, 2.4vw, 28px);
  line-height: 1.35;
}

.products {
  display: grid;
  grid-template-columns: repeat(2, minmax(280px, 1fr));
  gap: 12px;
}

.product {
  padding: 13px;
}

.gallery {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.gallery .main {
  grid-column: 1 / -1;
}

.g-media,
.g-placeholder {
  inline-size: 100%;
  aspect-ratio: 1 / 1;
  block-size: auto;
  border-radius: 12px;
  border: 1px solid var(--line);
}

.g-media {
  object-fit: cover;
  background: #f8f5fb;
}

.g-placeholder {
  display: grid;
  place-items: center;
  font-size: 13px;
  color: var(--muted);
  background: linear-gradient(145deg, #f8f4fb, #f2ebf8);
  text-align: center;
  padding: 8px;
}

.product h3 {
  margin: 10px 0 6px;
  font-size: clamp(18px, 1.9vw, 23px);
  line-height: 1.4;
}

.p-line {
  font-weight: 800;
  color: #5c2f70;
  margin-bottom: 4px;
  font-size: 15px;
  line-height: 1.5;
}

.p-sub {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.6;
}

.recommend {
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: 1px dashed #d8c4e9;
  background: #f8f3fc;
  color: #5d466e;
  font-weight: 800;
  text-align: center;
}

.layout {
  margin-top: 12px;
  display: grid;
  grid-template-columns: 1.22fr 0.78fr;
  gap: 12px;
}

.form,
.summary {
  padding: 14px;
}

.form h3,
.summary h3 {
  margin: 4px 0 12px;
  font-size: clamp(20px, 2.1vw, 26px);
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.field {
  margin-bottom: 10px;
}

.field label {
  display: block;
  margin-bottom: 5px;
  font-weight: 800;
}

.field input,
.field select,
.field textarea {
  inline-size: 100%;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: #fff;
  color: var(--ink);
  padding: 10px;
  font-family: inherit;
}

.field textarea {
  resize: vertical;
}

.price-box {
  min-block-size: 43px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: #f8f3fc;
  padding: 6px;
}

.price-box.empty {
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  color: #5b2e6f;
}

.price-grid {
  inline-size: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.price-cell {
  border: 1px dashed #dec9ef;
  border-radius: 9px;
  background: #fff;
  text-align: center;
  padding: 6px 7px;
}

.price-cell .k {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 2px;
}

.price-cell .v {
  display: block;
  font-size: 14px;
  font-weight: 900;
}

.price-cell.old .v {
  color: #8e8299;
  text-decoration: line-through;
}

.price-cell.new .v {
  color: #5b2e6f;
}

.chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.chip {
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  color: var(--ink);
  padding: 6px 12px;
  cursor: pointer;
  font-weight: 700;
}

.chip.on {
  background: #efe5f7;
  border-color: #d6bce8;
  color: #5c2f70;
}

.notice {
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  border: 1px solid var(--warn-line);
  background: var(--warn-bg);
  color: var(--warn-ink);
  font-size: 13px;
  line-height: 1.75;
}

.loc-actions {
  margin-top: 7px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.mini-btn {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
  font-weight: 700;
}

.submit {
  inline-size: 100%;
  border: 0;
  border-radius: 12px;
  padding: 12px;
  background: linear-gradient(135deg, var(--brand), #6f2f80);
  color: #fff;
  font-weight: 900;
  cursor: pointer;
}

.form-msg {
  min-block-size: 22px;
  margin-top: 9px;
  font-weight: 800;
}

.ok { color: var(--ok); }
.err { color: var(--err); }

.s-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px dashed #ece5f3;
}

.s-row:last-child {
  border-bottom: 0;
  font-size: 22px;
  font-weight: 900;
  color: #5b2e6f;
}

.summary-price-wrap {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-end;
  line-height: 1.2;
  gap: 3px;
}

.summary-price-old {
  font-size: 12px;
  color: #8e8299;
  text-decoration: line-through;
  font-weight: 700;
}

.float-wa {
  position: fixed;
  inset-inline-start: 16px;
  inset-block-end: 16px;
  z-index: 30;
  background: #1f8557;
  color: #fff;
  text-decoration: none;
  border-radius: 999px;
  padding: 12px 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 14px 28px rgba(31, 133, 87, 0.28);
  font-weight: 800;
}

.hidden {
  display: none !important;
}

@media (max-width: 980px) {
  .products { grid-template-columns: 1fr; }
  .layout { grid-template-columns: 1fr; }
  .row { grid-template-columns: 1fr; }
  .topbar { min-block-size: 118px; }
}

@media (max-width: 640px) {
  .topbar {
    min-block-size: 124px;
    padding-top: 30px;
  }

  .logo,
  .logo-fallback {
    inline-size: 84px;
    block-size: 84px;
  }

  .brand-name {
    font-size: clamp(24px, 8vw, 38px);
  }
}
</style>
</head>

<div class="wrap">
  <section class="card hero">
    <div class="topbar">
      <div class="lang-switch">
        <button type="button" class="lang-btn active" id="langAr">AR</button>
        <button type="button" class="lang-btn" id="langEn">EN</button>
      </div>

    </div>
    <div class="promo-line"><span id="promoText"></span></div>
    <div class="hero-main"><p id="heroText"></p></div>
    <div class="fast-row">
      <img id="fastImage" alt="fast delivery" class="hidden" />
      <strong class="fast-text" id="fastText"></strong>
    </div>
  </section>

  <section class="head"><h2 id="sectionTitle"></h2></section>
  <section id="products" class="products"></section>
  <section id="recommendText" class="recommend"></section>

  <section class="layout">
    <form id="orderForm" class="card form" novalidate>
      <h3 id="orderTitle"></h3>

      <div class="row">
        <div class="field">
          <label id="lblBouquet" for="bouquet"></label>
          <select id="bouquet"></select>
        </div>
        <div class="field">
          <label id="lblQty" for="qty"></label>
          <select id="qty"></select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label id="lblPrice" for="priceBox"></label>
          <div id="priceBox" class="price-box empty">-</div>
        </div>
        <div class="field">
          <label id="lblGov" for="gov"></label>
          <select id="gov"></select>
        </div>
      </div>

      <div id="deliveryNotice" class="notice"></div>

      <div class="field">
        <label id="lblColors"></label>
        <div id="colorChips" class="chips"></div>
      </div>

      <div id="localOnlyNote" class="notice hidden"></div>

      <div class="field">
        <label id="lblWrap" for="wrapColor"></label>
        <input id="wrapColor" type="text" />
      </div>

      <div class="row">
        <div class="field">
          <label id="lblDate" for="deliveryDate"></label>
          <input id="deliveryDate" type="date" />
        </div>
        <div class="field">
          <label id="lblTime" for="deliveryTime"></label>
          <select id="deliveryTime"></select>
        </div>
      </div>

      <div class="field">
        <label id="lblNotes" for="notes"></label>
        <textarea id="notes" rows="2"></textarea>
      </div>

      <div class="row">
        <div class="field">
          <label id="lblName" for="customerName"></label>
          <input id="customerName" type="text" />
        </div>
        <div class="field">
          <label id="lblPhone" for="phone"></label>
          <input id="phone" type="tel" />
        </div>
      </div>

      <div class="field">
        <label id="lblAddress" for="address"></label>
        <input id="address" type="text" />
      </div>

      <div class="field">
        <label id="lblLocation" for="location"></label>
        <input id="location" type="text" placeholder="https://maps.google.com/..." />
        <div class="loc-actions">
          <button id="btnCurrentLocation" class="mini-btn" type="button"></button>
          <button id="btnMaps" class="mini-btn" type="button"></button>
        </div>
      </div>

      <div class="field">
        <label id="lblCard" for="cardText"></label>
        <textarea id="cardText" rows="2"></textarea>
      </div>

      <div id="paymentNotice" class="notice"></div>

      <button id="submitBtn" class="submit" type="submit"></button>
      <div id="formMsg" class="form-msg"></div>
    </form>

    <aside class="card summary">
      <h3 id="summaryTitle"></h3>
      <div class="s-row"><span id="sLblProduct"></span><b id="sProduct">-</b></div>
      <div class="s-row"><span id="sLblQty"></span><b id="sQty">-</b></div>
      <div class="s-row"><span id="sLblPrice"></span><b id="sPrice">-</b></div>
      <div class="s-row"><span id="sLblShip"></span><b id="sShip">-</b></div>
      <div class="s-row"><span id="sLblTotal"></span><b id="sTotal">-</b></div>
    </aside>
  </section>
</div>

<a id="floatWa" class="float-wa" href="#" target="_blank" rel="noopener">
  <span>✆</span>
  <span id="waText"></span>
</a>

  async function loadSettingsFromRemote() {
    if (!DB || !DB.isReady()) return;
    try {
      const remote = await DB.loadSettings(DEF);
      settings = normalizeSettings(remote || DEF);
      writeJSON(KEYS.settings, settings);
    } catch {
      /* keep local fallback */
    }
  }

    refs.html.lang = lang;

    buildStatic();

  function renderProducts() {
    refs.products.innerHTML = settings.products.map((p) => {
      const imgs = Array.isArray(p.images) ? p.images : [];
      const slots = [0, 1, 2].map((idx) => {
        const cls = idx === 0 ? "main" : "";
        const url = (imgs[idx] || "").trim();
        if (url) {
          return `<img class="g-media ${cls}" src="${escapeHtml(url)}" alt="${escapeHtml(pick(p.title))}" />`;
        }
        return `<div class="g-placeholder ${cls}">${lang === "ar" ? "صورة المنتج" : "Product image"}</div>`;
      }).join("");

      return `
        <article class="card product">
          <div class="gallery">${slots}</div>
          <h3>${escapeHtml(pick(p.title))}</h3>
          <div class="p-line">${escapeHtml(pick(p.line))}</div>
          <div class="p-sub">${escapeHtml(pick(p.sub))}</div>
        </article>
      `;
    }).join("");
  }

  function populateSelectors() {
    const l = I18N[lang].labels;

    const currentBouquet = refs.bouquet.value;
    refs.bouquet.innerHTML = settings.products.map((p) => {
      return `<option value="${escapeAttr(p.id)}">${escapeHtml(pick(p.title))}</option>`;
    }).join("");

    const wantedBouquet = settings.products.find((p) => p.id === currentBouquet) ? currentBouquet : settings.products[0] && settings.products[0].id;
    refs.bouquet.value = wantedBouquet || "";

    const currentGov = refs.gov.value;
    refs.gov.innerHTML = `<option value="">${escapeHtml(l.choose)}</option>` + settings.governorates.map((g) => {
      return `<option value="${escapeAttr(g.key)}">${escapeHtml(lang === "ar" ? g.ar : g.en)}</option>`;
    }).join("");

    if (settings.governorates.some((g) => g.key === currentGov)) {
      refs.gov.value = currentGov;
    } else if (settings.governorates[0]) {
      refs.gov.value = settings.governorates[0].key;
    }

    const currentTime = refs.deliveryTime.value;
    refs.deliveryTime.innerHTML = `<option value="">${escapeHtml(l.choose)}</option>` + settings.deliveryWindows.map((w, idx) => {
      const text = lang === "ar" ? w.ar : w.en;
      return `<option value="${escapeAttr(String(idx))}">${escapeHtml(text)}</option>`;
    }).join("");
    if (currentTime && Number(currentTime) < settings.deliveryWindows.length) {
      refs.deliveryTime.value = currentTime;
    }

    onBouquetChange();
  }

  function onBouquetChange() {
    const product = getSelectedProduct();
    const currentQty = Number(refs.qty.value);
    const pricing = sortPricing(product && product.pricing || []);

    refs.qty.innerHTML = pricing.map((row) => {
      return `<option value="${Number(row.qty)}">${Number(row.qty)}</option>`;
    }).join("");

    if (pricing.some((r) => Number(r.qty) === currentQty)) {
      refs.qty.value = String(currentQty);
    } else if (pricing[0]) {
      refs.qty.value = String(pricing[0].qty);
    }

    selectedColor = "";
    updateColorUi();
    updateSummary();
  }

  function updateColorUi() {
    const product = getSelectedProduct();
    if (!product) {
      refs.colorChips.innerHTML = "";
      refs.localOnlyNote.classList.add("hidden");
      return;
    }

    const isLocal = product.type === "local";
    if (isLocal) {
      const label = lang === "ar" ? settings.localColor.ar : settings.localColor.en;
      selectedColor = label;
      refs.colorChips.innerHTML = `<button type="button" class="chip on" data-color="${escapeAttr(label)}">${escapeHtml(label)}</button>`;
      refs.localOnlyNote.classList.remove("hidden");
      return;
    }

    refs.localOnlyNote.classList.add("hidden");
    const colors = settings.importedColors.length ? settings.importedColors : DEF.importedColors;
    if (!selectedColor) {
      selectedColor = lang === "ar" ? colors[0].ar : colors[0].en;
    }

    refs.colorChips.innerHTML = colors.map((c) => {
      const label = lang === "ar" ? c.ar : c.en;
      const on = selectedColor === label ? "on" : "";
      return `<button type="button" class="chip ${on}" data-color="${escapeAttr(label)}">${escapeHtml(label)}</button>`;
    }).join("");

    refs.colorChips.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        selectedColor = chip.dataset.color || "";
        refs.colorChips.querySelectorAll(".chip").forEach((x) => x.classList.remove("on"));
        chip.classList.add("on");
        updateSummary();
      });
    });
  }

  function updateSummary() {
    const l = I18N[lang].labels;
    const product = getSelectedProduct();
    const qty = Number(refs.qty.value || 0);
    const gov = getSelectedGovernorate();
    const salePrice = getSalePrice(product, qty);
    const beforePrice = getBeforeDiscountPrice(salePrice);
    const shipping = product && product.freeShipping ? 0 : Number(gov && gov.fee || 0);
    const total = salePrice + shipping;

    renderPriceBox(beforePrice, salePrice, l);

    refs.sProduct.textContent = product ? pick(product.title) : "-";
    refs.sQty.textContent = qty ? String(qty) : "-";
    if (salePrice) {
      refs.sPrice.innerHTML = `
        <span class="summary-price-wrap">
          <span>${escapeHtml(money(salePrice))}</span>
          <span class="summary-price-old">${escapeHtml(money(beforePrice))}</span>
        </span>
      `;
    } else {
      refs.sPrice.textContent = "-";
    }
    refs.sShip.textContent = product ? (product.freeShipping ? l.free : money(shipping)) : "-";
    refs.sTotal.textContent = total ? money(total) : "-";
  }

  async function submitOrder(event) {
    event.preventDefault();
    clearMsg();

    const l = I18N[lang].labels;
    const product = getSelectedProduct();
    const qty = Number(refs.qty.value || 0);
    const gov = getSelectedGovernorate();
    const salePrice = getSalePrice(product, qty);
    const beforePrice = getBeforeDiscountPrice(salePrice);
    const shipping = product && product.freeShipping ? 0 : Number(gov && gov.fee || 0);
    const total = salePrice + shipping;

    const payload = {
      product: product,
      qty: qty,
      gov: gov,
      salePrice: salePrice,
      beforePrice: beforePrice,
      shipping: shipping,
      total: total,
      deliveryDate: refs.deliveryDate.value,
      deliveryTime: getDeliveryWindowText(refs.deliveryTime.value),
      notes: refs.notes.value.trim(),
      customerName: refs.customerName.value.trim(),
      phone: refs.phone.value.trim(),
      address: refs.address.value.trim(),
      locationUrl: refs.location.value.trim(),
      cardText: refs.cardText.value.trim(),
      wrapColor: refs.wrapColor.value.trim(),
      color: selectedColor || ""
    };

    if (!isValidOrder(payload)) {
      setErr(l.required);
      return;
    }

    if (!isLikelyPhone(payload.phone)) {
      setErr(l.badPhone);
      return;
    }

    const order = {
      id: buildOrderId(),
      createdAt: new Date().toISOString(),
      source: "offers",
      language: lang,
      productId: product.id,
      productType: product.type,
      productName: pick(product.title),
      quantity: payload.qty,
      salePrice: payload.salePrice,
      beforePrice: payload.beforePrice,
      shipping: payload.shipping,
      total: payload.total,
      governorate: lang === "ar" ? payload.gov.ar : payload.gov.en,
      governorateKey: payload.gov.key,
      deliveryDate: payload.deliveryDate,
      deliveryTime: payload.deliveryTime,
      color: payload.color,
      wrapColor: payload.wrapColor,
      notes: payload.notes,
      customerName: payload.customerName,
      phone: payload.phone,
      address: payload.address,
      locationUrl: payload.locationUrl,
      cardText: payload.cardText,
      status: "review",
      payment: "unpaid",
      collector: "",
      collected: 0,
      adminNotes: ""
    };

    const orders = readJSON(KEYS.orders, []);
    orders.push(order);
    writeJSON(KEYS.orders, orders);

    if (DB && DB.isReady()) {
      const okRemote = await DB.upsertOrder(order);
      if (!okRemote) {
        setErr(lang === "ar" ? "تم الحفظ محليًا فقط. راجع ربط قاعدة البيانات." : "Saved locally only. Check database connection.");
        return;
      }
    }

    setOk(l.sent);

    const text = buildWhatsappOrderText(order);
    const url = buildWaLink(settings.whatsappOrder, text);
    window.open(url, "_blank", "noopener");

    refs.notes.value = "";
    refs.cardText.value = "";
    refs.wrapColor.value = "";
    updateSummary();
  }

  function isValidOrder(p) {
    if (!p.product) return false;
    if (!p.qty || !p.salePrice) return false;
    if (!p.gov) return false;
    if (!p.deliveryDate || !p.deliveryTime) return false;
    if (!p.customerName || !p.phone || !p.address) return false;
    if (p.product.type === "imported" && !p.color) return false;
    return true;
  }

  function useCurrentLocation() {
    clearMsg();
    const l = I18N[lang].labels;
    if (!navigator.geolocation) {
      setErr(l.locFail);
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude.toFixed(6);
        const lng = pos.coords.longitude.toFixed(6);
        refs.location.value = `https://www.google.com/maps?q=${lat},${lng}`;
        setOk(l.locationReady);
      },
      () => setErr(l.locFail),
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
    );
  }

      lines.push("New Order - Iris Petals");
      lines.push(`Order ID: ${order.id}`);
      lines.push("---------------------------");
      lines.push(`Bouquet: ${order.productName}`);
      lines.push(`Quantity: ${order.quantity}`);

    return lines.join("\n");

  function getSelectedProduct() {
    return settings.products.find((p) => p.id === refs.bouquet.value) || settings.products[0] || null;
  }

  function getSelectedGovernorate() {
    return settings.governorates.find((g) => g.key === refs.gov.value) || settings.governorates[0] || null;
  }

  function getSalePrice(product, qty) {
    if (!product) return 0;
    const row = sortPricing(product.pricing).find((p) => Number(p.qty) === Number(qty));
    return Number(row && row.price || 0);
  }

  function getBeforeDiscountPrice(salePrice) {
    const sale = Number(salePrice || 0);
    if (sale <= 0) return 0;
    const discount = clampDiscount(settings.discountPercent);
    const ratio = 1 - (discount / 100);
    if (ratio <= 0) return sale;
    return Math.round((sale / ratio) * 100) / 100;
  }

  function renderPriceBox(beforePrice, salePrice, labels) {
    if (!salePrice) {
      refs.priceBox.classList.add("empty");
      refs.priceBox.textContent = "-";
      return;
    }
    refs.priceBox.classList.remove("empty");
    refs.priceBox.innerHTML = `
      <div class="price-grid">
        <div class="price-cell old">
          <span class="k">${escapeHtml(labels.beforeDiscount)}</span>
          <span class="v">${escapeHtml(money(beforePrice))}</span>
        </div>
        <div class="price-cell new">
          <span class="k">${escapeHtml(labels.afterDiscount)}</span>
          <span class="v">${escapeHtml(money(salePrice))}</span>
        </div>
      </div>
    `;
  }

  function getDeliveryWindowText(value) {
    const idx = Number(value);
    const row = settings.deliveryWindows[idx];
    if (!row) return "";
    return lang === "ar" ? row.ar : row.en;
  }

  function sortPricing(list) {
    return list
      .map((x) => ({ qty: Number(x.qty || 0), price: Number(x.price || 0) }))
      .filter((x) => x.qty > 0 && x.price >= 0)
      .sort((a, b) => b.qty - a.qty);
  }

  function readJSON(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return structuredCloneSafe(fallback);
      const parsed = JSON.parse(raw);
      return parsed == null ? structuredCloneSafe(fallback) : parsed;
    } catch {
      return structuredCloneSafe(fallback);
    }
  }

  function writeJSON(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
  }

  function normalizeSettings(raw) {
    const merged = deepMerge(structuredCloneSafe(DEF), raw || {});

    merged.products = Array.isArray(merged.products) ? merged.products : structuredCloneSafe(DEF.products);
    const map = new Map(merged.products.map((p) => [p.id, p]));
    merged.products = DEF.products.map((base) => {
      const got = map.get(base.id) || {};
      const out = deepMerge(structuredCloneSafe(base), got);
      out.images = Array.isArray(out.images) ? out.images.slice(0, 3) : ["", "", ""];
      while (out.images.length < 3) out.images.push("");
      out.pricing = sortPricing(out.pricing);
      if (!out.pricing.length) out.pricing = structuredCloneSafe(base.pricing);
      return out;
    });

    merged.governorates = (Array.isArray(merged.governorates) ? merged.governorates : [])
      .map((g, idx) => ({
        key: slug(g.key || g.ar || g.en || `gov-${idx + 1}`),
        ar: String(g.ar || "").trim() || `محافظة ${idx + 1}`,
        en: String(g.en || "").trim() || `Governorate ${idx + 1}`,
        fee: Number(g.fee || 0)
      }))
      .filter((g) => g.key);
    if (!merged.governorates.length) merged.governorates = structuredCloneSafe(DEF.governorates);

    merged.importedColors = (Array.isArray(merged.importedColors) ? merged.importedColors : [])
      .map((c) => ({ ar: String(c.ar || "").trim(), en: String(c.en || "").trim() }))
      .filter((c) => c.ar || c.en);
    if (!merged.importedColors.length) merged.importedColors = structuredCloneSafe(DEF.importedColors);

    merged.deliveryWindows = (Array.isArray(merged.deliveryWindows) ? merged.deliveryWindows : [])
      .map((w) => ({ ar: String(w.ar || "").trim(), en: String(w.en || "").trim() }))
      .filter((w) => w.ar || w.en);
    if (!merged.deliveryWindows.length) merged.deliveryWindows = structuredCloneSafe(DEF.deliveryWindows);

    merged.discountPercent = clampDiscount(merged.discountPercent);

    return merged;
  }

  function pick(obj) {
    if (!obj || typeof obj !== "object") return "";
    return String(obj[lang] || obj.ar || obj.en || "");
  }

  function money(v) {
    const n = Number(v || 0);
    if (lang === "ar") return `${n.toLocaleString("ar-EG")} جنيه`;
    return `${n.toLocaleString("en-US")} EGP`;
  }

  function clampDiscount(v) {
    const n = Number(v);
    if (!isFinite(n)) return 50;
    return Math.min(95, Math.max(0, n));
  }

  function clearMsg() {
    refs.formMsg.className = "form-msg";
    refs.formMsg.textContent = "";
  }

  function setOk(text) {
    refs.formMsg.className = "form-msg ok";
    refs.formMsg.textContent = text;
  }

  function setErr(text) {
    refs.formMsg.className = "form-msg err";
    refs.formMsg.textContent = text;
  }

  function buildOrderId() {
    return `IP-${Date.now().toString().slice(-8)}`;
  }

  function isLikelyPhone(phone) {
    const d = onlyDigits(phone);
    return d.length >= 10 && d.length <= 15;
  }

  function buildWaLink(num, text) {
    const wa = normalizeWaNumber(num);
    return `https://wa.me/${wa}?text=${encodeURIComponent(text || "")}`;
  }

  function normalizeWaNumber(input) {
    let d = onlyDigits(input);
    if (d.startsWith("00")) d = d.slice(2);
    if (d.startsWith("0")) return `2${d}`;
    if (d.startsWith("20")) return d;
    return d;
  }

  function onlyDigits(s) {
    return String(s || "").replace(/\D+/g, "");
  }

  function slug(v) {
    return String(v || "")
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9\u0600-\u06ff]+/g, "-")
      .replace(/^-+|-+$/g, "")
      .slice(0, 40);
  }

  function structuredCloneSafe(v) {
    return JSON.parse(JSON.stringify(v));
  }

  function deepMerge(base, patch) {
    if (!patch || typeof patch !== "object") return base;
    for (const key of Object.keys(patch)) {
      const pv = patch[key];
      if (Array.isArray(pv)) {
        base[key] = structuredCloneSafe(pv);
      } else if (pv && typeof pv === "object") {
        const bv = base[key] && typeof base[key] === "object" && !Array.isArray(base[key]) ? base[key] : {};
        base[key] = deepMerge(bv, pv);
      } else if (pv !== undefined) {
        base[key] = pv;
      }
    }
    return base;
  }

  function escapeHtml(s) {
    return String(s || "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;"
    }[c]));
  }

  function escapeAttr(s) {
    return escapeHtml(s).replace(/`/g, "&#96;");
  }

  function makeDefaultFavicon() {
    const svg = "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='30' fill='%23efe5f7'/><path d='M32 14c6 6 8 12 3 17-5-2-7-8-3-17zM18 28c8 1 13 4 14 10-6 2-11-1-14-10zM46 28c-3 9-8 12-14 10 1-6 6-9 14-10zM24 48c6-8 10-8 16 0-6 4-10 4-16 0z' fill='%237a3d89'/></svg>";
    return `data:image/svg+xml,${encodeURIComponent(svg)}`;
  }
})();
</script>
